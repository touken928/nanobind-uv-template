# Build wheels on Linux / Windows / macOS (and an sdist on Linux), then attach
# them to a GitHub Release. Triggered on push of tags matching `v*`.
#
# GitHub Packages has no official Python (PyPI) registry; GitHub Releases is the
# idiomatic way to ship pre-built wheels from a GitHub repository. Consumers
# install with (asset name must exist on the latest release):
#
#     pip install https://github.com/touken928/nanobind-uv-template/releases/latest/download/<wheel>

name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Existing v*-prefixed tag to (re)build a release for."
        required: true
        type: string

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  # ---------------------------------------------------------------------------
  # 1. Platform-native wheels.
  # ---------------------------------------------------------------------------
  build-wheel:
    name: Wheel / ${{ matrix.name }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            name: Linux (x86_64)
          - os: windows-latest
            name: Windows (amd64)
          - os: macos-latest
            name: macOS (arm64)

    runs-on: ${{ matrix.os }}

    defaults:
      run:
        shell: bash

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.tag || github.ref }}

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          version: latest

      - name: Install Linux build dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends ninja-build patchelf

      - name: Build wheel
        run: uv build --wheel

      # PyPI / pip expect manylinux_* on Linux x86_64, not bare linux_x86_64.
      - name: Repair Linux wheel (manylinux)
        if: runner.os == 'Linux'
        run: |
          python -m pip install --upgrade pip auditwheel
          mkdir -p wheel-repaired
          auditwheel repair dist/*.whl -w wheel-repaired
          rm -f dist/*.whl
          mv wheel-repaired/*.whl dist/

      - uses: actions/upload-artifact@v4
        with:
          name: wheel-${{ matrix.os }}
          path: dist/*.whl
          if-no-files-found: error

  # ---------------------------------------------------------------------------
  # 2. Source distribution (platform-independent).
  # ---------------------------------------------------------------------------
  build-sdist:
    name: Source distribution
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.tag || github.ref }}

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          version: latest

      - name: Build sdist
        run: uv build --sdist

      - uses: actions/upload-artifact@v4
        with:
          name: sdist
          path: dist/*.tar.gz
          if-no-files-found: error

  # ---------------------------------------------------------------------------
  # 3. Create the GitHub Release and attach every artifact to it.
  # ---------------------------------------------------------------------------
  publish:
    name: Publish GitHub Release
    needs: [build-wheel, build-sdist]
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          pattern: "{wheel-*,sdist}"
          merge-multiple: true

      - name: List artifacts
        run: ls -la dist

      - name: Resolve tag
        id: tag
        run: |
          if [ -n "${{ inputs.tag }}" ]; then
            echo "name=${{ inputs.tag }}" >> "$GITHUB_OUTPUT"
          else
            echo "name=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
          fi

      - name: Create / update GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.name }}
          name: ${{ steps.tag.outputs.name }}
          draft: false
          prerelease: ${{ contains(steps.tag.outputs.name, '-') }}
          generate_release_notes: true
          files: dist/*
          fail_on_unmatched_files: true
